name: release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Test
        if: matrix.os == 'ubuntu-latest'
        run: cargo test --release --locked

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        run: |
          tar -C target/${{ matrix.target }}/release -czf \
            "xf-typegen-${{ matrix.target }}.tar.gz" xf-typegen

      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path target/${{ matrix.target }}/release/xf-typegen.exe `
            -DestinationPath xf-typegen-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: xf-typegen-${{ matrix.target }}
          path: xf-typegen-${{ matrix.target }}.${{ matrix.ext }}
          if-no-files-found: error

  release:
    name: publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish stable release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          make_latest: true
          generate_release_notes: true
          files: dist/*

      - name: Reset nightly
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release delete nightly --cleanup-tag --yes || true

      - name: Publish nightly
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: nightly
          prerelease: true
          target_commitish: ${{ github.sha }}
          files: dist/*
          body: |
            Rolling build from the latest commit on `main`.
            Commit: ${{ github.sha }}
